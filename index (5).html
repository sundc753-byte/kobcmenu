<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f5f5f3" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)" />
  <title>마린시티 식당 돌림판</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #ffffff;
      --bg2:    #f5f5f3;
      --bg3:    #eeede8;
      --text:   #1a1a1a;
      --text2:  #6b6b6b;
      --bd:     rgba(0,0,0,0.12);
      --bd2:    rgba(0,0,0,0.22);
      --r-md:   8px;
      --r-lg:   12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:   #1c1c1e;
        --bg2:  #2c2c2e;
        --bg3:  #3a3a3c;
        --text: #f2f2f7;
        --text2:#aeaeb2;
        --bd:   rgba(255,255,255,0.12);
        --bd2:  rgba(255,255,255,0.22);
      }
    }

    html, body {
      height: 100%;
      background: var(--bg3);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 820px;
      margin: 0 auto;
      padding: 1.2rem 1rem 2rem;
    }

    h1 {
      font-size: 19px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 3px;
      letter-spacing: -0.3px;
    }
    .subtitle {
      font-size: 12px;
      color: var(--text2);
      text-align: center;
      margin-bottom: 1.2rem;
    }

    /* ── 필터 ── */
    .filter-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      align-items: center;
    }
    .filter-btn {
      font-size: 12px;
      padding: 5px 13px;
      border-radius: 20px;
      cursor: pointer;
      border: 0.5px solid var(--bd2);
      background: var(--bg);
      color: var(--text2);
      transition: background .15s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
      font-weight: 600;
    }
    .reset-btn {
      margin-left: auto;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      border: 0.5px solid var(--bd);
      background: transparent;
      color: var(--text2);
      transition: color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .reset-btn:hover, .reset-btn:active { color: #E24B4A; border-color: #F09595; }

    /* ── 레이아웃 ── */
    .main-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
    }
    @media (max-width: 560px) {
      .main-layout { grid-template-columns: 1fr; }
    }

    /* ── 왼쪽: 돌림판 ── */
    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    canvas#wheel {
      border-radius: 50%;
      border: 2px solid var(--bd2);
      background: var(--bg2);
      width: 100%;
      max-width: 280px;
      height: auto;
      aspect-ratio: 1;
      touch-action: none;
    }
    #spin-btn {
      width: 100%;
      max-width: 280px;
      padding: 11px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border-radius: var(--r-md);
      border: none;
      background: #E24B4A;
      color: #fff;
      letter-spacing: 0.5px;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    #spin-btn:hover  { opacity: .9; }
    #spin-btn:active { transform: scale(.97); }
    #spin-btn:disabled { background: var(--bg3); color: var(--text2); cursor: not-allowed; transform: none; }

    /* ── 히스토리 ── */
    .history-box {
      width: 100%;
      max-width: 280px;
      background: var(--bg2);
      border-radius: var(--r-lg);
      padding: 10px 12px;
    }
    .history-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .history-list { display: flex; flex-wrap: wrap; gap: 5px; }
    .history-pill {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--bg3);
      color: var(--text2);
      border: 0.5px solid var(--bd);
    }

    /* ── 오른쪽: 결과 ── */
    .results-section { display: flex; flex-direction: column; gap: 9px; justify-content: flex-start; }

    .empty-state {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      padding: 2.5rem 1rem;
      border: 0.5px dashed var(--bd2);
      border-radius: var(--r-lg);
      line-height: 2;
    }

    .result-card {
      background: var(--bg);
      border-radius: var(--r-lg);
      padding: 11px 14px;
      border: 0.5px solid var(--bd);
      transition: transform .1s;
    }
    .result-card.rank-1 { border: 2px solid #E24B4A; }
    .result-card.rank-2 { border: 1.5px solid #BA7517; }
    .result-card.rank-3 { border: 1px solid #185FA5; }

    .rank-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 5px;
      letter-spacing: 0.3px;
    }
    .rank-1 .rank-badge { background: #FCEBEB; color: #A32D2D; }
    .rank-2 .rank-badge { background: #FAEEDA; color: #854F0B; }
    .rank-3 .rank-badge { background: #E6F1FB; color: #0C447C; }

    .restaurant-name { font-size: 15px; font-weight: 600; color: var(--text); }
    .restaurant-meta { font-size: 11px; color: var(--text2); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px; }
    .tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--bg2);
      color: var(--text2);
    }
    .menu-text { font-size: 12px; color: var(--text2); margin-top: 4px; }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 11px;
      color: var(--text2);
    }
  </style>
</head>
<body>
<div id="app">
  <h1>★ 마린시티 식당 돌림판 ★</h1>
  <p class="subtitle">전날 메뉴와 겹치지 않게 · 3순위까지 추천</p>

  <div class="filter-row">
    <button class="filter-btn active" data-filter="전체"  onclick="setFilter(this)">전체</button>
    <button class="filter-btn" data-filter="한식"  onclick="setFilter(this)">한식</button>
    <button class="filter-btn" data-filter="분식"  onclick="setFilter(this)">분식</button>
    <button class="filter-btn" data-filter="양식"  onclick="setFilter(this)">양식</button>
    <button class="filter-btn" data-filter="아시아" onclick="setFilter(this)">아시아</button>
    <button class="reset-btn" onclick="resetHistory()">오늘 기록 초기화</button>
  </div>

  <div class="main-layout">
    <div class="wheel-section">
      <canvas id="wheel" width="280" height="280"></canvas>
      <button id="spin-btn" onclick="spin()">🎲 돌리기!</button>
      <div class="history-box">
        <div class="history-title">오늘 먹은 메뉴 (제외됨)</div>
        <div class="history-list" id="history-list">
          <span class="history-pill" style="font-style:italic;">아직 없음</span>
        </div>
      </div>
    </div>

    <div class="results-section" id="results">
      <div class="empty-state">돌림판을 돌려<br>오늘의 식당을 정해보세요! 🍽️</div>
    </div>
  </div>

  <footer>마린시티 식당리스트 기준 · 가격 단위: 만원</footer>
</div>

  {name:"고봉민김밥",       loc:"제니스",             type:"분식",   menu:"김밥 등",                price:0.9},
  {name:"우봉",             loc:"하이페리온",         type:"아시아", menu:"샤브샤브, 소고기 구이",  price:1.9},
  {name:"담동대구뼈찜아구찜",loc:"한일오르듀",        type:"한식",   menu:"아구찜",                 price:4.3},
  {name:"버거앤파스타",     loc:"한일오르듀",         type:"양식",   menu:"햄버거, 파스타 등",      price:1.5},

  {name:"치즈치즈치즈",     loc:"현대카멜리아",       type:"양식",   menu:"파스타, 뇨끼 등",        price:1.5},

// ── 상수 ─────────────────────────────────────
const COLORS = [
  "#7F77DD","#1D9E75","#D85A30","#378ADD",
  "#639922","#BA7517","#D4537E","#888780",
  "#E24B4A","#0F6E56","#993C1D","#185FA5",
];
const MAX_SLICES = 16;
const STORAGE_KEY = "marinSpinner_v2";

// ── 상태 ─────────────────────────────────────
let usedToday    = [];
let curFilter    = "전체";
let spinning     = false;
let curAngle     = 0;

// ── 시작 ─────────────────────────────────────
(function init() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const { date, list } = JSON.parse(raw);
      if (date === new Date().toDateString()) usedToday = list;
    }
  } catch {}
  updateHistoryUI();
  drawWheel(getPool(), curAngle);
})();

// ── 필터 ─────────────────────────────────────
function setFilter(btn) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  curFilter = btn.dataset.filter;
  curAngle  = 0;
  drawWheel(getPool(), curAngle);
}

function getPool() {
  let pool = RESTAURANTS.filter(r => !usedToday.includes(r.name));
  if (curFilter !== "전체") pool = pool.filter(r => r.type === curFilter);
  return pool;
}

// ── 히스토리 ─────────────────────────────────
function saveHistory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    date: new Date().toDateString(),
    list: usedToday,
  }));
}

function resetHistory() {
  usedToday = [];
  saveHistory();
  updateHistoryUI();
  curAngle = 0;
  drawWheel(getPool(), curAngle);
  document.getElementById("results").innerHTML =
    '<div class="empty-state">돌림판을 돌려<br>오늘의 식당을 정해보세요! 🍽️</div>';
}

function updateHistoryUI() {
  const el = document.getElementById("history-list");
  el.innerHTML = usedToday.length === 0
    ? '<span class="history-pill" style="font-style:italic;">아직 없음</span>'
    : usedToday.map(n => `<span class="history-pill">${n}</span>`).join("");
}

// ── 캔버스 그리기 ─────────────────────────────
function drawWheel(pool, angle) {
  const canvas = document.getElementById("wheel");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, R = cx - 12;

  ctx.clearRect(0, 0, W, H);

  if (!pool.length) {
    ctx.fillStyle = "#aaa";
    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.font = "13px sans-serif";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("해당 메뉴 없음", cx, cy);
    return;
  }

  const n   = Math.min(pool.length, MAX_SLICES);
  const arc = (Math.PI*2) / n;

  for (let i = 0; i < n; i++) {
    const s = angle + i * arc;
    const e = s + arc;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, R, s, e);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(s + arc/2);
    ctx.textAlign    = "right";
    ctx.textBaseline = "middle";
    ctx.fillStyle    = "#fff";
    ctx.font         = "600 11px sans-serif";
    const raw   = pool[i].name;
    const label = raw.length > 7 ? raw.slice(0,6)+"…" : raw;
    ctx.fillText(label, R - 8, 0);
    ctx.restore();
  }

  // 중앙 허브
  ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI*2);
  ctx.fillStyle   = "#fff"; ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,.15)"; ctx.lineWidth = 1; ctx.stroke();

  // 포인터 ▶
  ctx.beginPath();
  ctx.moveTo(W - 3,      cy);
  ctx.lineTo(W - 3 - 20, cy - 11);
  ctx.lineTo(W - 3 - 20, cy + 11);
  ctx.closePath();
  ctx.fillStyle = "#E24B4A"; ctx.fill();
}

// ── 스핀 ─────────────────────────────────────
function spin() {
  const pool = getPool();
  if (spinning) return;
  if (pool.length < 3) {
    alert(`남은 식당이 3개 미만입니다.\n"오늘 기록 초기화" 또는 다른 필터를 선택해주세요.`);
    return;
  }

  spinning = true;
  document.getElementById("spin-btn").disabled = true;

  const total     = Math.PI * 2 * (8 + Math.random() * 6);
  const duration  = 4000;
  const t0        = performance.now();
  const a0        = curAngle;
  const ease = t => 1 - Math.pow(1 - t, 4);

  (function frame(now) {
    const p = Math.min((now - t0) / duration, 1);
    curAngle = a0 + total * ease(p);
    drawWheel(pool, curAngle);
    if (p < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      document.getElementById("spin-btn").disabled = false;
      pickResults(pool, curAngle);
    }
  })(performance.now());
}

// ── 결과 선택 ─────────────────────────────────
function pickResults(pool, finalAngle) {
  const n   = Math.min(pool.length, MAX_SLICES);
  const arc = (Math.PI*2) / n;
  const norm  = ((finalAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  const ptr   = (Math.PI*2 - norm) % (Math.PI*2);
  const idx   = Math.floor(ptr / arc) % n;

  const picked = [pool[idx]];
  const rest   = pool.filter(r => r.name !== picked[0].name);
  while (picked.length < 3 && rest.length > 0) {
    picked.push(rest.splice(Math.floor(Math.random() * rest.length), 1)[0]);
  }

  usedToday.push(picked[0].name);
  saveHistory();
  updateHistoryUI();
  curAngle = 0;
  drawWheel(getPool(), curAngle);
  renderResults(picked);
}

// ── 결과 렌더링 ───────────────────────────────
function renderResults(picked) {
  const labels  = ["🥇 1순위 — 오늘의 선택!", "🥈 2순위", "🥉 3순위"];
  const classes = ["rank-1", "rank-2", "rank-3"];
  document.getElementById("results").innerHTML = picked.map((r, i) => `
    <div class="result-card ${classes[i]}">
      <span class="rank-badge">${labels[i]}</span>
      <div class="restaurant-name">${r.name}</div>
      <div class="restaurant-meta">
        <span class="tag">${r.type}</span>
        <span class="tag">${r.loc}</span>
        <span class="tag">약 ${r.price}만원</span>
      </div>
      <div class="menu-text">${r.menu}</div>
    </div>
  `).join("");
}
</script>
