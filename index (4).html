<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마린시티 식당 돌림판</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f3;
      --bg3: #eeede8;
      --text: #1a1a1a;
      --text2: #6b6b6b;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --bg2: #2c2c2e;
        --bg3: #3a3a3c;
        --text: #f2f2f7;
        --text2: #aeaeb2;
        --border: rgba(255,255,255,0.12);
        --border2: rgba(255,255,255,0.22);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg3);
      color: var(--text);
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }

    #app {
      max-width: 820px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      align-items: center;
    }

    .filter-btn {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      border: 0.5px solid var(--border2);
      background: var(--bg);
      color: var(--text2);
      transition: background 0.15s, color 0.15s;
    }

    .filter-btn.active {
      background: var(--bg3);
      color: var(--text);
      font-weight: 500;
      border-color: var(--border2);
    }

    .reset-btn {
      margin-left: auto;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      cursor: pointer;
      border: 0.5px solid var(--border);
      background: transparent;
      color: var(--text2);
      transition: color 0.15s;
    }

    .reset-btn:hover { color: #E24B4A; border-color: #F09595; }

    .main-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 540px) {
      .main-layout { grid-template-columns: 1fr; }
    }

    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    canvas#wheel {
      border-radius: 50%;
      border: 2px solid var(--border2);
      background: var(--bg2);
    }

    #spin-btn {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      border-radius: var(--radius-md);
      border: 1.5px solid var(--border2);
      background: var(--bg2);
      color: var(--text);
      transition: background 0.15s;
    }

    #spin-btn:hover { background: var(--bg3); }
    #spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .history-section { width: 100%; }

    .history-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .history-list { display: flex; flex-wrap: wrap; gap: 6px; }

    .history-pill {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--bg2);
      color: var(--text2);
      border: 0.5px solid var(--border);
    }

    .results-section { display: flex; flex-direction: column; gap: 10px; }

    .result-card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 12px 16px;
    }

    .result-card.rank-1 { border: 1.5px solid #E24B4A; }
    .result-card.rank-2 { border: 1.5px solid #BA7517; }
    .result-card.rank-3 { border: 1.5px solid #185FA5; }

    .rank-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: var(--radius-md);
      margin-bottom: 6px;
    }

    .rank-1 .rank-badge { background: #FCEBEB; color: #A32D2D; }
    .rank-2 .rank-badge { background: #FAEEDA; color: #854F0B; }
    .rank-3 .rank-badge { background: #E6F1FB; color: #0C447C; }

    .restaurant-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }

    .restaurant-meta {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--bg2);
      color: var(--text2);
    }

    .menu-text {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
    }

    .empty-state {
      font-size: 13px;
      color: var(--text2);
      text-align: center;
      padding: 2.5rem 1rem;
      border: 0.5px dashed var(--border2);
      border-radius: var(--radius-lg);
      line-height: 1.8;
    }

    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 12px;
      color: var(--text2);
    }
  </style>
</head>
<body>
<div id="app">
  <h1>★ 마린시티 식당 돌림판 ★</h1>
  <p class="subtitle">전날 메뉴와 겹치지 않게 · 3순위까지 추천</p>

  <div class="filter-row">
    <button class="filter-btn active" data-filter="전체" onclick="setFilter(this)">전체</button>
    <button class="filter-btn" data-filter="한식" onclick="setFilter(this)">한식</button>
    <button class="filter-btn" data-filter="분식" onclick="setFilter(this)">분식</button>
    <button class="filter-btn" data-filter="양식" onclick="setFilter(this)">양식</button>
    <button class="filter-btn" data-filter="아시아" onclick="setFilter(this)">아시아</button>
    <button class="reset-btn" onclick="resetHistory()">오늘 기록 초기화</button>
  </div>

  <div class="main-layout">
    <div class="wheel-section">
      <canvas id="wheel" width="280" height="280"></canvas>
      <button id="spin-btn" onclick="spin()">🎲 돌리기!</button>
      <div class="history-section">
        <div class="history-title">오늘 먹은 메뉴 (제외됨)</div>
        <div class="history-list" id="history-list">
          <span class="history-pill" style="font-style:italic;">아직 없음</span>
        </div>
      </div>
    </div>

    <div class="results-section" id="results">
      <div class="empty-state">돌림판을 돌려<br>오늘의 식당을 정해보세요! 🍽️</div>
    </div>
  </div>

  <footer>마린시티 식당리스트 (2025.11.18 기준)</footer>
</div>

<script src="restaurants.js"></script>
<script src="spinner.js"></script>
</body>
</html>
